blueprint:
  name: Lluvia - Bajar persianas
  description: >
    Consulta la previsión de lluvia y/o un sensor físico de lluvia y baja
    las persianas para proteger los cristales. Puede preguntar confirmación,
    actuar automáticamente, y notificar cuando deje de llover para subirlas.

    Versión: 1.3.1
    Más información: https://www.mainmind.com/blog/automatizar-persianas-prevision-de-lluvia/

    Novedades v1.3.1:
      · Fix: selector de rain_sensor ahora usa sintaxis oficial 'filter:'
        con device_class 'moisture' priorizado. Los binary_sensor de
        detección de agua/fuga aparecen primero en el desplegable;
        el resto de binary_sensor como fallback.
      · Fix: selector de weather_entity corregido por consistencia.

    Novedades v1.3.0:
      · Soporte opcional para sensor físico de lluvia (binary_sensor
        device_class: moisture). Ej.: detector Zigbee ZG-223Z.
      · Puede usarse solo forecast, solo sensor físico, o ambos combinados.
      · Estrategia AND/OR configurable para decidir "ya no llueve" cuando
        se usan ambas fuentes.
      · Time_pattern /30min sigue siendo el heartbeat. El sensor físico
        añade un trigger reactivo adicional para respuesta inmediata.
      · Bugfixes: cooldown ya no se bloquea por disparos de subida, y el
        cálculo de max_precip es robusto frente a forecast vacío.
  domain: automation
  homeassistant:
    min_version: "2024.6.0"
  input:

    # ── SECCIÓN: FUENTES DE DETECCIÓN ────────────────────────────────────
    weather_entity:
      name: Entidad meteorológica (opcional)
      description: >
        Entidad weather.* para predicción de lluvia (Met.no recomendado).
        Déjalo vacío si solo quieres usar un sensor físico.
      default: ""
      selector:
        entity:
          filter:
            - domain: weather

    rain_sensor:
      name: Sensor físico de lluvia (opcional)
      description: >
        binary_sensor que indica 'on' cuando detecta agua. Reacciona
        inmediatamente, sin esperar al ciclo de 30 minutos del forecast.
        Se listan binary_sensor con device_class 'moisture' (detectores
        de agua/fuga) o sin device_class. Déjalo vacío si no tienes.
      default: ""
      selector:
        entity:
          filter:
            - domain: binary_sensor
              device_class: moisture
            - domain: binary_sensor

    rain_sensor_debounce:
      name: Debounce sensor físico (segundos)
      description: >
        Tiempo que el sensor debe mantenerse 'on' para considerar lluvia real.
        Filtra pulsos espurios de la primera gota.
      default: 30
      selector:
        number:
          min: 0
          max: 300
          step: 5
          unit_of_measurement: "s"

    rain_sensor_dry_minutes:
      name: Minutos secos para considerar fin de lluvia
      description: >
        Tiempo que el sensor debe mantenerse 'off' para considerar que
        ha dejado de llover. Solo aplica si se usa el sensor físico.
      default: 20
      selector:
        number:
          min: 1
          max: 180
          step: 1
          unit_of_measurement: "min"

    combine_strategy:
      name: Estrategia de combinación (si usas ambas fuentes)
      description: >
        Solo aplica si tienes configurados weather_entity Y rain_sensor.

        · "OR" — Llueve si cualquiera de las dos lo indica. Para DEJAR de
          llover, ambas deben estar secas. Más conservador (persianas
          bajadas más tiempo).

        · "AND" — Llueve solo si ambas lo indican. Para DEJAR de llover,
          basta con que una de las dos esté seca. Menos conservador.

        Si solo tienes una fuente configurada, este parámetro se ignora.
      default: "OR"
      selector:
        select:
          options:
            - "OR"
            - "AND"

    # ── SECCIÓN: PERSIANAS ───────────────────────────────────────────────
    covers:
      name: Persianas
      description: Persianas que se moverán.
      selector:
        target:
          entity:
            domain: cover

    reference_cover:
      name: Persiana de referencia
      description: >
        Una de las persianas del grupo, usada para detectar si ya están
        en posición lluvia.
      selector:
        entity:
          domain: cover

    cover_position_pct:
      name: Posición de protección
      description: >
        Seleccione el porcentaje en función de su configuración de persianas.
        Active la opción de lógica invertida si su integración usa el sentido
        contrario al estándar.
      default: 70
      selector:
        number:
          min: 0
          max: 100
          step: 1
          unit_of_measurement: "%"

    inverted_covers:
      name: Persianas con lógica invertida
      description: >
        Activa si tu integración usa el sentido contrario al estándar de HA.
        Con esta opción activada se enviará el valor directamente sin invertir.
      default: false
      selector:
        boolean:

    # ── SECCIÓN: UMBRALES FORECAST ───────────────────────────────────────
    precipitation_threshold:
      name: Precipitación mínima para actuar (forecast)
      description: >
        Milímetros de lluvia previstos en la próxima hora a partir de los
        cuales se actúa. Met.no proporciona mm de precipitación, no
        porcentaje de probabilidad.

        Referencia orientativa:
        - Llovizna:        0.1 – 0.5 mm/h
        - Lluvia débil:    0.5 – 2.0 mm/h  ← recomendado
        - Lluvia moderada: 2.0 – 10 mm/h
        - Lluvia intensa:  > 10 mm/h
      default: 0.5
      selector:
        number:
          min: 0.1
          max: 10.0
          step: 0.1
          unit_of_measurement: "mm/h"

    forecast_hours:
      name: Horas de previsión a consultar
      description: >
        Número de horas hacia adelante. 1h para máxima reactividad.
      default: 1
      selector:
        number:
          min: 1
          max: 12
          step: 1
          unit_of_measurement: "h"

    # ── SECCIÓN: NOTIFICACIÓN Y CONFIRMACIÓN ─────────────────────────────
    ask_confirmation:
      name: Preguntar antes de bajar
      description: >
        Si se activa, envía notificación pidiendo confirmación antes de bajar.
        Si se desactiva, las persianas bajan automáticamente.
      default: true
      selector:
        boolean:

    ask_when_stopped:
      name: Preguntar cuando deje de llover
      description: >
        Si se activa, envía notificación preguntando si subir las persianas
        cuando la precipitación baje del umbral.
        Si se desactiva, las persianas suben automáticamente.
      default: true
      selector:
        boolean:

    cooldown_hours:
      name: Horas mínimas entre notificaciones de bajada
      description: Evita preguntar repetidamente si sigue lloviendo.
      default: 4
      selector:
        number:
          min: 1
          max: 24
          step: 1
          unit_of_measurement: "h"

    no_molestar_schedule:
      name: Horario "no molestar"
      description: No se enviará ninguna notificación mientras este horario esté activo.
      selector:
        entity:
          domain: schedule

    notification_service:
      name: Servicio de notificación
      description: >
        Escribe el nombre completo del servicio, por ejemplo:
        notify.moviles_de_la_granja, notify.mobile_app_mi_telefono
      default: notify.
      selector:
        text:

    response_timeout:
      name: Minutos máximos esperando respuesta
      description: >
        Tiempo máximo esperando confirmación antes de cancelar.
        No tiene sentido que supere el intervalo de consulta (30 min).
      default: 5
      selector:
        number:
          min: 1
          max: 60
          step: 1
          unit_of_measurement: "min"

    # ── SECCIÓN: PRUEBAS ─────────────────────────────────────────────────
    test_mode:
      name: "⚠️ Modo pruebas"
      description: >
        SOLO PARA PRUEBAS. Desactiva las 3 restricciones de la automatización:
        umbral de precipitación, cooldown entre notificaciones y horario no molestar.
        La automatización se disparará en cada ciclo de 30 minutos independientemente
        de la lluvia prevista. DESACTIVAR una vez finalizadas las pruebas.
      default: false
      selector:
        boolean:

###############################################################################
# TRIGGERS
# - Heartbeat cada 30 minutos: evalúa forecast + sensor + estado de persianas.
# - Trigger reactivo del sensor físico: respuesta inmediata al primer pulso.
# - Trigger fin de lluvia del sensor: detecta transición off sostenida.
#
# Los triggers reactivos solo hacen algo útil si hay rain_sensor configurado,
# pero no podemos hacer el trigger condicional (limitación del blueprint).
# Por eso filtramos dentro de 'variables' y 'conditions'.
###############################################################################
trigger_variables:
  rain_sensor_id: !input rain_sensor
  rain_sensor_debounce_sec: !input rain_sensor_debounce
  rain_sensor_dry_min: !input rain_sensor_dry_minutes

triggers:
  - trigger: time_pattern
    minutes: "/30"
    id: heartbeat

  # Trigger reactivo del sensor físico — empieza a llover
  - trigger: template
    value_template: >-
      {{ rain_sensor_id != ''
         and states(rain_sensor_id) == 'on' }}
    for:
      seconds: "{{ rain_sensor_debounce_sec | int(30) }}"
    id: sensor_on

  # Trigger reactivo del sensor físico — deja de llover
  - trigger: template
    value_template: >-
      {{ rain_sensor_id != ''
         and states(rain_sensor_id) == 'off' }}
    for:
      minutes: "{{ rain_sensor_dry_min | int(20) }}"
    id: sensor_off

actions:
  # 1. Variables base (antes de consultar forecast, por si no hay weather)
  - variables:
      weather_id: !input weather_entity
      rain_sensor_id_a: !input rain_sensor
      hours: !input forecast_hours
      threshold: !input precipitation_threshold
      closed_pct: !input cover_position_pct
      inverted: !input inverted_covers
      ref_cover: !input reference_cover
      ask: !input ask_confirmation
      ask_stop: !input ask_when_stopped
      cooldown: !input cooldown_hours
      timeout_min: !input response_timeout
      test: !input test_mode
      no_molestar: !input no_molestar_schedule
      combine: !input combine_strategy
      has_weather: "{{ weather_id != '' }}"
      has_sensor: "{{ rain_sensor_id_a != '' }}"

  # 2. Condición temprana: tiene que haber al menos una fuente configurada
  - condition: template
    value_template: "{{ has_weather or has_sensor }}"

  # 3. Consultar forecast solo si hay weather configurado
  - if:
      - "{{ has_weather }}"
    then:
      - action: weather.get_forecasts
        target:
          entity_id: !input weather_entity
        data:
          type: hourly
        response_variable: prevision

  # 4. Variables derivadas — combinación de fuentes
  - variables:
      # Precipitación máxima prevista (mm/h). Robusto frente a forecast
      # vacío o ausente.
      max_precip: >-
        {% if has_weather
              and prevision is defined
              and prevision.get(weather_id) is mapping
              and prevision[weather_id].get('forecast') %}
          {% set horas = prevision[weather_id]['forecast'][:hours | int] %}
          {% set mm = horas
                      | map(attribute='precipitation')
                      | reject('none')
                      | map('float', 0)
                      | list %}
          {{ (mm | max) if mm | length > 0 else 0 }}
        {% else %}
          0
        {% endif %}

      # Estado actual del sensor físico
      sensor_wet: >-
        {{ has_sensor and states(rain_sensor_id_a) == 'on' }}

      # Valor real a enviar al cover según lógica
      actual_position: >-
        {{ closed_pct | int if inverted else (100 - closed_pct) | int }}

      # ¿Llueve ahora según forecast?
      forecast_rain: >-
        {{ has_weather and (max_precip | float(0) > threshold | float) }}

      # ¿Llueve ahora? (agregado según fuentes disponibles y estrategia)
      is_raining: >-
        {% if has_weather and has_sensor %}
          {% if combine == 'AND' %}
            {{ forecast_rain and sensor_wet }}
          {% else %}
            {{ forecast_rain or sensor_wet }}
          {% endif %}
        {% elif has_weather %}
          {{ forecast_rain }}
        {% else %}
          {{ sensor_wet }}
        {% endif %}

      # ¿Ha dejado de llover? (agregado según fuentes y estrategia)
      # Simétrico a is_raining: con OR para llover, AND para secar (y viceversa).
      is_dry: >-
        {% if has_weather and has_sensor %}
          {% if combine == 'AND' %}
            {{ (not forecast_rain) or (not sensor_wet) }}
          {% else %}
            {{ (not forecast_rain) and (not sensor_wet) }}
          {% endif %}
        {% elif has_weather %}
          {{ not forecast_rain }}
        {% else %}
          {{ not sensor_wet }}
        {% endif %}

      # ¿La persiana de referencia está ya en posición lluvia?
      cover_at_rain_pos: >-
        {{ state_attr(ref_cover, 'current_position') | int(-1) == actual_position | int }}

      # Cooldown — usa un atributo de input_text si quisiéramos persistencia
      # real, pero para mantener compatibilidad con la v1.2.1 usamos
      # this.attributes.last_triggered. Para evitar el bug de la 1.2.1
      # (que también bloqueaba tras subida), solo aplicamos cooldown si el
      # último trigger fue del heartbeat y el estado actual sigue siendo
      # "llover + persianas arriba". En la práctica: solo bloquea repeticiones
      # del mismo escenario de bajada.
      cooldown_seconds_elapsed: >-
        {% if this.attributes.last_triggered is none %}
          999999
        {% else %}
          {{ (now() - this.attributes.last_triggered.astimezone()).total_seconds() | int }}
        {% endif %}
      cooldown_ok: >-
        {{ cooldown_seconds_elapsed > (cooldown | int * 3600) }}

      # Aviso en notificación si la lógica está invertida
      mode_note: >-
        {{ '(lógica invertida)' if inverted else '' }}
      # Aviso en notificación si está en modo pruebas
      test_note: >-
        {{ '⚠️ MODO PRUEBAS ACTIVO — ' if test else '' }}
      # Origen textual para notificaciones
      origen_txt: >-
        {% if has_weather and has_sensor %}
          {% if forecast_rain and sensor_wet %}previsión + sensor
          {% elif forecast_rain %}previsión ({{ max_precip }} mm/h)
          {% elif sensor_wet %}sensor físico
          {% else %}—
          {% endif %}
        {% elif has_weather %}previsión ({{ max_precip }} mm/h)
        {% elif has_sensor %}sensor físico
        {% endif %}

  - choose:

      # ── PATH A: Llueve y persianas NO están en posición lluvia ──────
      - conditions:
          - "{{ test or states(no_molestar) == 'off' }}"
          - "{{ test or is_raining }}"
          - "{{ not cover_at_rain_pos }}"
          # Bypass del cooldown si el trigger es reactivo del sensor
          # (queremos reaccionar inmediatamente, no bloqueados por cooldown).
          - "{{ test or trigger.id == 'sensor_on' or cooldown_ok }}"
        sequence:
          - choose:
              # Con confirmación: pregunta y espera respuesta
              - conditions:
                  - "{{ ask }}"
                sequence:
                  - action: !input notification_service
                    data:
                      title: "🌧️ Va a llover"
                      message: >-
                        {{ test_note }}Origen: {{ origen_txt | trim }}.
                        {% if forecast_rain %}
                        Precipitación prevista: {{ max_precip }} mm
                        en la{{ 's' if hours | int > 1 }}
                        próxima{{ 's' if hours | int > 1 }} {{ hours }}h.
                        {% endif %}
                        ¿Bajo las persianas al {{ closed_pct }}%?
                      data:
                        tag: lluvia_persianas
                        timeout: "{{ timeout_min | int * 60 }}"
                        actions:
                          - action: BAJAR_LLUVIA
                            title: "✅ Sí, bajar"
                          - action: NO_BAJAR_LLUVIA
                            title: "❌ No"
                  - wait_for_trigger:
                      - trigger: event
                        event_type: mobile_app_notification_action
                        event_data:
                          action: BAJAR_LLUVIA
                      - trigger: event
                        event_type: mobile_app_notification_action
                        event_data:
                          action: NO_BAJAR_LLUVIA
                    timeout:
                      minutes: "{{ timeout_min | int }}"
                    continue_on_timeout: false
                  - condition: template
                    value_template: >-
                      {{ wait.trigger is not none and
                         wait.trigger.event.data.action == 'BAJAR_LLUVIA' }}
                  - action: cover.set_cover_position
                    target: !input covers
                    data:
                      position: "{{ actual_position }}"
                  - action: !input notification_service
                    data:
                      title: "🪟 Persianas bajadas"
                      message: >-
                        {{ test_note }}Persianas al {{ closed_pct }}% por lluvia. {{ mode_note }}
                      data:
                        tag: lluvia_persianas
                        timeout: 300
            # Sin confirmación: actúa directamente y notifica
            default:
              - action: cover.set_cover_position
                target: !input covers
                data:
                  position: "{{ actual_position }}"
              - action: !input notification_service
                data:
                  title: "🌧️ Persianas bajadas automáticamente"
                  message: >-
                    {{ test_note }}Lluvia detectada — origen: {{ origen_txt | trim }}.
                    Persianas al {{ closed_pct }}%. {{ mode_note }}
                  data:
                    tag: lluvia_persianas
                    timeout: 60

      # ── PATH B: Ha dejado de llover y persianas EN posición lluvia ──
      - conditions:
          - "{{ test or states(no_molestar) == 'off' }}"
          - "{{ test or is_dry }}"
          - "{{ cover_at_rain_pos }}"
        sequence:
          - choose:
              # Con confirmación: pregunta y espera respuesta
              - conditions:
                  - "{{ ask_stop }}"
                sequence:
                  - action: !input notification_service
                    data:
                      title: "☀️ Ha dejado de llover"
                      message: >-
                        {{ test_note }}
                        {% if has_weather %}Precipitación prevista: {{ max_precip }} mm.{% endif %}
                        {% if has_sensor %}Sensor físico: {{ 'mojado' if sensor_wet else 'seco' }}.{% endif %}
                        ¿Subo las persianas?
                      data:
                        tag: lluvia_persianas
                        timeout: "{{ timeout_min | int * 60 }}"
                        actions:
                          - action: SUBIR_LLUVIA
                            title: "✅ Sí, subir"
                          - action: NO_SUBIR_LLUVIA
                            title: "❌ No"
                  - wait_for_trigger:
                      - trigger: event
                        event_type: mobile_app_notification_action
                        event_data:
                          action: SUBIR_LLUVIA
                      - trigger: event
                        event_type: mobile_app_notification_action
                        event_data:
                          action: NO_SUBIR_LLUVIA
                    timeout:
                      minutes: "{{ timeout_min | int }}"
                    continue_on_timeout: false
                  - condition: template
                    value_template: >-
                      {{ wait.trigger is not none and
                         wait.trigger.event.data.action == 'SUBIR_LLUVIA' }}
                  - action: cover.open_cover
                    target: !input covers
            # Sin confirmación: sube directamente y notifica
            default:
              - action: cover.open_cover
                target: !input covers
              - action: !input notification_service
                data:
                  title: "☀️ Persianas subidas automáticamente"
                  message: >-
                    {{ test_note }}Ha dejado de llover
                    {% if has_weather %}({{ max_precip }} mm previstos){% endif %}
                    — persianas subidas.
                  data:
                    tag: lluvia_persianas
                    timeout: 60

mode: single
